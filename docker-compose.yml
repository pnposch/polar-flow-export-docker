services:
  selenium:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - /dev/shm:/dev/shm
  app:
      container_name: export
      build:
        context: .
      environment:
        - SELENIUM_HOST=selenium
        - SELENIUM_PORT=4444
        - POLAR_USER=${POLAR_USER}
        - POLAR_PASS=${POLAR_PASS}
      volumes:
        - ../polar_data/:/data #change to your destination, i suggest going up in the tree
        - ./polar-export.py:/polar-export.py #not needed but useful for local testing
      depends_on:
        selenium:
          condition: service_healthy